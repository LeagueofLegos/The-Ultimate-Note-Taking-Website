<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Note-Taking Website</title>
    <style>
        :root {
            --bg-color: #121216;
            --panel-color: #1c1c22;
            --accent-color: #ffb703;
            --text-color: #e2e2e7;
            --text-dim: #a0a0a5;
            --danger-color: #e74c3c;
            --move-color: #2196f3;
            --dustloop-dark: #151518;
            --dustloop-border: #2d2d38;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .view-section { display: block; }
        .hidden { display: none !important; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dustloop-border);
            padding-bottom: 15px;
            margin-bottom: 15px;
            background: rgba(28, 28, 34, 0.85);
            padding: 15px;
            border-radius: 6px;
            backdrop-filter: blur(5px);
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 1px; color: var(--accent-color); font-weight: 700; }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 10px 14px;
            background-color: var(--dustloop-dark);
            border: 2px solid var(--dustloop-border);
            border-radius: 4px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
        }
        .search-box:focus { border-color: var(--accent-color); }

        .search-results-pane {
            background-color: var(--panel-color);
            border: 2px solid var(--dustloop-border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .search-results-pane h3 { margin-top: 0; color: var(--accent-color); }
        
        .search-result-item {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            font-family: inherit;
            color: inherit;
            padding: 10px;
            border-bottom: 1px solid var(--dustloop-border);
            cursor: pointer;
        }
        .search-result-item:hover { background-color: rgba(255, 183, 3, 0.1); }
        .search-path { font-size: 12px; color: var(--text-dim); }

        .nav-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 14px;
            color: var(--text-dim);
            background: rgba(21, 21, 24, 0.8);
            padding: 10px;
            border-radius: 4px;
        }

        .nav-link {
            cursor: pointer;
            color: var(--accent-color);
            font-weight: bold;
            background: none;
            border: none;
            padding: 0;
            font-size: 14px;
        }
        .nav-link:hover { text-decoration: underline; }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            background-color: var(--panel-color);
            color: white;
            border: 2px solid var(--dustloop-border);
            padding: 10px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { 
            border-color: var(--accent-color);
            background-color: #25252d;
        }
        .btn-main {
            background-color: #2d2d38;
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .btn-main:hover {
            background-color: var(--accent-color);
            color: var(--dustloop-dark);
        }
        .btn-utility { border-color: #444; color: var(--text-dim); }
        
        .btn-paste {
            background-color: var(--move-color);
            border-color: var(--move-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            background: rgba(21, 21, 24, 0.6);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .combo-grid-section {
            background: rgba(28, 28, 34, 0.9);
            border: 2px solid var(--dustloop-border);
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
        }
        .combo-grid-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .combo-grid-title { margin: 0; font-size: 18px; color: var(--accent-color); font-weight: bold; }
        
        .combo-entries-layout { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .combo-row-card { background-color: var(--dustloop-dark); border: 1px solid var(--dustloop-border); border-radius: 4px; padding: 12px; position: relative; }
        .combo-notation { font-family: 'Courier New', Courier, monospace; font-size: 15px; color: #fff; background: #000; padding: 6px 10px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }

        .card-container { position: relative; aspect-ratio: 1 / 1; }
