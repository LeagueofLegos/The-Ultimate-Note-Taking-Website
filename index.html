<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Note-Taking Website</title>
    <style>
        :root {
            --bg-color: #121216;
            --panel-color: #1c1c22;
            --accent-color: #ffb703;
            --text-color: #e2e2e7;
            --text-dim: #a0a0a5;
            --danger-color: #e74c3c;
            --move-color: #2196f3;
            --dustloop-dark: #151518;
            --dustloop-border: #2d2d38;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .view-section { display: block; }
        .hidden { display: none !important; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dustloop-border);
            padding-bottom: 15px;
            margin-bottom: 15px;
            background: rgba(28, 28, 34, 0.85);
            padding: 15px;
            border-radius: 6px;
            backdrop-filter: blur(5px);
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 1px; color: var(--accent-color); font-weight: 700; }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 10px 14px;
            background-color: var(--dustloop-dark);
            border: 2px solid var(--dustloop-border);
            border-radius: 4px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
        }
        .search-box:focus { border-color: var(--accent-color); }

        .search-results-pane {
            background-color: var(--panel-color);
            border: 2px solid var(--dustloop-border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .search-results-pane h3 { margin-top: 0; color: var(--accent-color); }
        
        .search-result-item {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            font-family: inherit;
            color: inherit;
            padding: 10px;
            border-bottom: 1px solid var(--dustloop-border);
            cursor: pointer;
        }
        .search-result-item:hover { background-color: rgba(255, 183, 3, 0.1); }
        .search-path { font-size: 12px; color: var(--text-dim); }
