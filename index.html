<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Note-Taking Website</title>
    <style>
        :root {
            --bg-color: #121216;
            --panel-color: #1c1c22;
            --accent-color: #ffb703;
            --text-color: #e2e2e7;
            --text-dim: #a0a0a5;
            --danger-color: #e74c3c;
            --move-color: #2196f3;
            --dustloop-dark: #151518;
            --dustloop-border: #2d2d38;
            --grid-block-color: #25252d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .view-section { display: block; }
        .hidden { display: none !important; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dustloop-border);
            padding-bottom: 15px;
            margin-bottom: 15px;
            background: rgba(28, 28, 34, 0.85);
            padding: 15px;
            border-radius: 6px;
            backdrop-filter: blur(5px);
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 1px; color: var(--accent-color); font-weight: 700; }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 10px 14px;
            background-color: var(--dustloop-dark);
            border: 2px solid var(--dustloop-border);
            border-radius: 4px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
        }
        .search-box:focus { border-color: var(--accent-color); }

        .search-results-pane {
            background-color: var(--panel-color);
            border: 2px solid var(--dustloop-border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .search-results-pane h3 { margin-top: 0; color: var(--accent-color); }
        
        /* Fixed Keyboard-Navigable Search Elements */
        .search-result-item {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            font-family: inherit;
            color: inherit;
            padding: 10px;
            border-bottom: 1px solid var(--dustloop-border);
            cursor: pointer;
        }
        .search-result-item:hover { background-color: rgba(255, 183, 3, 0.1); }
        .search-path { font-size: 12px; color: var(--text-dim); }

        .nav-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 14px;
            color: var(--text-dim);
            background: rgba(21, 21, 24, 0.8);
            padding: 10px;
            border-radius: 4px;
        }

        .nav-link {
            cursor: pointer;
            color: var(--accent-color);
            font-weight: bold;
            background: none;
            border: none;
            padding: 0;
            font-size: 14px;
        }
        .nav-link:hover { text-decoration: underline; }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            background-color: var(--panel-color);
            color: white;
            border: 2px solid var(--dustloop-border);
            padding: 10px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { 
            border-color: var(--accent-color);
            background-color: #25252d;
        }
        .btn-main {
            background-color: #2d2d38;
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .btn-main:hover {
            background-color: var(--accent-color);
            color: var(--dustloop-dark);
        }
        .btn-utility { border-color: #444; color: var(--text-dim); }
        
        .btn-paste {
            background-color: var(--move-color);
            border-color: var(--move-color);
            animation: pulse 2s infinite;
        }
        .btn-paste:hover {
            background-color: #1976d2;
            border-color: #1976d2;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(33, 150, 243, 0); }
            100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }

        /* Standard Navigation Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            background: rgba(21, 21, 24, 0.6);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* NEW FEATURE: Combo Block Containers (Dustloop Grid Style) */
        .combo-grid-section {
            background: rgba(28, 28, 34, 0.9);
            border: 2px solid var(--dustloop-border);
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
        }
        .combo-grid-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .combo-grid-title { margin: 0; font-size: 18px; color: var(--accent-color); font-weight: bold; }
        
        .combo-entries-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .combo-row-card {
            background-color: var(--dustloop-dark);
            border: 1px solid var(--dustloop-border);
            border-radius: 4px;
            padding: 12px;
            position: relative;
        }
        .combo-notation {
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            color: #fff;
            background: #000;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .card-container { position: relative; aspect-ratio: 1 / 1; }

        .grid-item {
            width: 100%;
            height: 100%;
            background-color: var(--panel-color);
            border: 2px solid var(--dustloop-border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s, background-color 0.2s;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            user-select: none;
            color: var(--text-color);
            font-family: inherit;
        }
        .grid-item:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
            background-color: #22222a;
        }
        .grid-item.moving { opacity: 0.4; border-style: dashed; border-color: var(--move-color); }

        .icon { font-size: 48px; margin-bottom: 10px; }
        .folder-icon { color: var(--accent-color); }
        .file-icon { color: #5c78ff; }
        .grid-icon { color: #2ecc71; }
        .item-name { font-weight: 600; font-size: 16px; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-delete, .btn-move {
            position: absolute;
            top: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #aaa;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .btn-delete { right: 8px; }
        .btn-delete:hover { background-color: var(--danger-color); color: white; border-color: var(--danger-color); }
        .btn-move { left: 8px; font-size: 14px; }
        .btn-move:hover { background-color: var(--move-color); color: white; border-color: var(--move-color); }

        .editor-layout { display: flex; flex-direction: column; gap: 15px; height: calc(100vh - 120px); margin-top: 15px; }
        .editor-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; min-height: 0; }
        .editor-pane {
            width: 100%; height: 100%; background-color: var(--dustloop-dark); border: 2px solid var(--dustloop-border);
            border-radius: 6px; color: #f1f1f1; font-family: 'Courier New', Courier, monospace; font-size: 16px;
            padding: 15px; box-sizing: border-box; resize: none; outline: none;
        }
        .editor-pane:focus { border-color: var(--accent-color); }

        .preview-pane { background-color: var(--panel-color); border: 2px solid var(--dustloop-border); border-radius: 6px; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .preview-pane h1 { font-size: 2em; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px; margin-top: 0; color: white; }
        .preview-pane h2 { font-size: 1.5em; border-bottom: 1px solid var(--dustloop-border); padding-bottom: 5px; color: var(--accent-color); }
        .preview-pane h3 { font-size: 1.2em; color: #e2e2e7; margin-top: 15px; }
        .preview-pane ul { padding-left: 20px; }
        .preview-pane br { content: ""; display: block; margin: 6px 0; }

        .help-panel { background-color: var(--panel-color); border: 2px solid var(--dustloop-border); border-radius: 6px; padding: 12px; font-size: 13px; }
        .help-title { font-weight: bold; color: var(--accent-color); cursor: pointer; display: flex; justify-content: space-between; }
        .help-content { margin-top: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; color: var(--text-dim); }
        .help-content code { background: #000; padding: 2px 4px; border-radius: 3px; color: #fff; }
    </style>
</head>
<body>

    <div id="browser-view" class="view-section">
        <header>
            <h1>ULTIMATE NOTES</h1>
            <div class="controls">
                <button class="btn btn-utility" onclick="exportMetadata()">Export Data</button>
                <input type="file" id="import-file" style="display: none;" onchange="importMetadata(this)">
                <button class="btn btn-utility" onclick="document.getElementById('import-file').click()">Import Data</button>
                <input type="file" id="bg-upload" style="display: none;" accept="image/*" onchange="uploadBackground(this)">
                <button class="btn btn-utility" onclick="document.getElementById('bg-upload').click()">🖼️ BG Art</button>
                
                <button class="btn btn-paste" id="btn-paste" onclick="pasteItem()" style="display: none;">📋 Paste Here</button>
                <button class="btn btn-main" id="btn-folder" onclick="createNewItem('folder')">+ New Folder</button>
                <button class="btn" id="btn-file" onclick="createNewItem('file')" style="display: none;">+ New File</button>
                <button class="btn btn-main" id="btn-grid" onclick="createNewItem('grid')" style="display: none;">📊 + New Grid</button>
            </div>
        </header>

        <input type="text" id="searchBar" class="search-box" placeholder="🔍 Search folders and files across the database..." oninput="handleGlobalSearch()">
        
        <div id="search-results" class="search-results-pane hidden">
            <h3>Search Results</h3>
            <div id="search-results-list"></div>
        </div>

        <div class="nav-bar" id="breadcrumbs"></div>
        <main class="grid" id="folder-grid"></main>
        
        <div id="active-combo-grids-zone"></div>
    </div>
